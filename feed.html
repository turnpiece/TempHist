<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- INCLUDE:head-common -->
    <meta name="description" content="See what TempHist users are discovering — recent temperature history charts generated by people around the world." />
    <meta property="og:title" content="Public feed | TempHist" />
    <meta property="og:description" content="See what TempHist users are discovering — recent temperature history charts generated by people around the world." />
    <meta property="og:url" content="https://temphist.com/feed" />
    <meta name="twitter:title" content="Public feed | TempHist" />
    <meta name="twitter:description" content="See what TempHist users are discovering — recent temperature history charts generated by people around the world." />
    <title>TempHist • Public feed</title>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "TempHist Public Feed",
      "description": "Recent temperature history charts generated by TempHist users around the world.",
      "url": "https://temphist.com/feed",
      "isPartOf": {
        "@type": "WebSite",
        "name": "TempHist",
        "url": "https://temphist.com"
      },
      "breadcrumb": {
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://temphist.com"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "Public Feed",
            "item": "https://temphist.com/feed"
          }
        ]
      }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"
      integrity="sha384-dug+JxfBvklEQdJ4AYuBBAIScUz0bVN73xpy273gcAwHjb3qI0fXmuYNaNfdyYJG"
      crossorigin="anonymous" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0/dist/chartjs-plugin-annotation.min.js"
      integrity="sha384-WVRZ5bDoBpBp9eKFxji3f7JiiY/SCi2kWJpzG+AgHnafhqQOzp4mmqsPBZgiCxlu"
      crossorigin="anonymous" defer></script>
    </head>
  <body class="feed-page">
    <!-- INCLUDE:nav -->

    <div id="appShell">
      <main id="viewOutlet" role="main">
        <section id="feedView" data-view="feed">
        </section>

        <!-- INCLUDE:footer -->
      </main>
    </div>


    <script type="module" src="/src/main.ts" defer></script>
  </body>
</html>
